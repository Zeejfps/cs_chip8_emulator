name: Deploy WASM to GitHub Pages
run-name: Deploying to Web (${{ github.ref_type == 'tag' && github.ref_name || github.sha }})

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Chip8Emulator.App.Wasm/web/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Install frontend deps
        working-directory: Chip8Emulator.App.Wasm/web
        run: npm ci

      - name: Publish
        run: dotnet publish Chip8Emulator.App.Wasm/Chip8Emulator.App.Wasm.csproj -c Release -o publish

      - name: Disable Jekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Copy sitemap into bundle
        run: cp Chip8Emulator.App.Wasm/web/public/sitemap.xml publish/wwwroot/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
