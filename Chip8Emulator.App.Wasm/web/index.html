<!DOCTYPE html>
<html lang="en" class="dark crt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a120d" />
  <title>CHIP-8</title>
  <style>
    #boot {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a120d;
      color: #6dff9c;
      font-family: 'JetBrains Mono Variable', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-shadow: 0 0 4px rgba(109, 255, 156, 0.55);
      opacity: 1;
    }
    #boot::after {
      content: '_';
      display: inline-block;
      margin-left: 0.05em;
    }
    #boot.fade-out { opacity: 0; }
    @media (prefers-reduced-motion: no-preference) {
      #boot { transition: opacity 200ms ease-out; }
      #boot::after { animation: boot-blink 1s infinite; }
    }
    @keyframes boot-blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }
  </style>
  <script type="module" src="./src/main.ts"></script>
</head>
<body>
  <div id="boot">booting</div>
  <div id="app"></div>
</body>
</html>
