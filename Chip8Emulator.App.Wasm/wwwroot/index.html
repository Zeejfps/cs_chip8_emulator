<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHIP-8 Emulator</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="module" src="./main.js"></script>
</head>
<body>
  <main>
    <h1>CHIP-8</h1>
    <div class="controls">
      <label class="file-label">
        Load ROM
        <input type="file" id="rom" accept=".ch8,.rom,.bin,application/octet-stream" />
      </label>
      <button id="restart" disabled>Restart</button>
      <button id="pause" disabled>Pause</button>
      <button id="step" disabled>Step</button>
      <span id="status">Install wasm-tools and build to get started.</span>
    </div>
    <canvas id="screen" width="64" height="32"></canvas>
    <div class="speed-control">
      <label for="ips-range">Speed</label>
      <input type="range" id="ips-range" min="500" max="1500" step="100" value="1000" />
      <input type="number" id="ips-number" min="500" max="1500" step="100" value="1000" />
      <span class="unit">IPS</span>
    </div>
    <fieldset class="quirks-controls">
      <legend>Quirks</legend>
      <div class="preset-row">
        <label><input type="radio" name="quirk-preset" value="cosmac" /> COSMAC VIP</label>
        <label><input type="radio" name="quirk-preset" value="chip48" checked /> CHIP-48</label>
        <label><input type="radio" name="quirk-preset" value="schip" /> SUPER-CHIP 1.1</label>
        <label><input type="radio" name="quirk-preset" value="xochip" /> XO-CHIP</label>
        <label><input type="radio" name="quirk-preset" value="custom" /> Custom</label>
      </div>
      <div class="quirk-toggles">
        <label><input type="checkbox" id="q-shift-vy" /> Shift <code>8XY6/8XYE</code> uses VY</label>
        <label><input type="checkbox" id="q-jump-vx" checked /> Jump <code>BNNN</code> uses VX</label>
        <label><input type="checkbox" id="q-ls-inc-i" /> Load/Store <code>FX55/FX65</code> increments I</label>
        <label><input type="checkbox" id="q-logic-vf" /> Logic <code>8XY1/2/3</code> resets VF</label>
      </div>
    </fieldset>
    <pre id="disasm" class="disasm" aria-label="Upcoming instructions"></pre>
    <details class="help">
      <summary>Keyboard</summary>
      <pre>
CHIP-8 keypad         Your keyboard
1 2 3 C               1 2 3 4
4 5 6 D               Q W E R
7 8 9 E               A S D F
A 0 B F               Z X C V</pre>
    </details>
  </main>
</body>
</html>
